services:

  # -----------------------------------------------------------
  # MySQL 8 — Base de données
  # -----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: conciergerie_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: conciergerie
      MYSQL_USER: ${MYSQL_USER:-concierge_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-concierge_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql          # données persistantes
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    networks:
      - conciergerie_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
            "-u", "${MYSQL_USER:-concierge_user}",
            "-p${MYSQL_PASSWORD:-concierge_pass}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # -----------------------------------------------------------
  # Spring Boot — API REST (port 8080)
  # -----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: conciergerie_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/conciergerie?useSSL=false&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-concierge_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-concierge_pass}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-dev}
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production_32chars_min}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-900000}       # 15 min
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}  # 7 jours
      UPLOAD_DIR: /app/uploads
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads           # pièces jointes persistantes
    networks:
      - conciergerie_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # -----------------------------------------------------------
  # React / Vite — Frontend (port 3000)
  # -----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    container_name: conciergerie_ui
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"                           # Nginx sert le build Vite
    networks:
      - conciergerie_net

  # -----------------------------------------------------------
  # phpMyAdmin — Interface d'administration DB (optionnel)
  # Accessible sur http://localhost:8081
  # Désactivez en prod avec : docker compose --profile prod up
  # -----------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: conciergerie_phpmyadmin
    profiles: ["dev"]                       # uniquement en dev
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER:-concierge_user}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-concierge_pass}
    ports:
      - "8081:80"
    networks:
      - conciergerie_net

# ---------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------
volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local

# ---------------------------------------------------------------
# Réseau interne isolé
# ---------------------------------------------------------------
networks:
  conciergerie_net:
    driver: bridge
