# ===================================================================
# Configuration Globale - ConciergeApp API
# ===================================================================

spring:
  application:
    name: concierge-api

  # -----------------------------------------------------------------
  # Profils
  # -----------------------------------------------------------------
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # -----------------------------------------------------------------
  # Datasource (MySQL)
  # -----------------------------------------------------------------
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/conciergerie?useSSL=false&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:concierge_user}
    password: ${SPRING_DATASOURCE_PASSWORD:concierge_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # -----------------------------------------------------------------
  # JPA / Hibernate
  # -----------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: validate # Flyway gère les migrations, Hibernate valide juste le schéma
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    open-in-view: false

  # -----------------------------------------------------------------
  # Flyway (Migrations de base de données)
  # -----------------------------------------------------------------
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # -----------------------------------------------------------------
  # Configuration Mail (SMTP)
  # -----------------------------------------------------------------
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025} # Port par défaut de MailHog/Mailtrap en dev
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  # -----------------------------------------------------------------
  # Servlet & File Upload
  # -----------------------------------------------------------------
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

# ===================================================================
# Configuration du Serveur
# ===================================================================
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# ===================================================================
# Actuator (Monitoring & Health)
# ===================================================================
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when_authorized

# ===================================================================
# Sécurité & JWT (Custom Properties)
# ===================================================================
application:
  security:
    jwt:
      # Doit faire au moins 32 caractères pour HS256
      secret-key: ${JWT_SECRET:changeme_in_production_32chars_min_random_string}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}         # 1h par défaut
      refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 jours
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ===================================================================
# SpringDoc (Swagger OpenAPI)
# ===================================================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  show-actuator: true

# ===================================================================
# Logging
# ===================================================================
logging:
  level:
    root: INFO
    com.conciergerie: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
